<div class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100">
  <!-- Material Header -->
  <div class="bg-white shadow-md sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-6 py-6">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-3xl font-bold text-gray-900">Resultados de búsqueda</h1>
          <p class="text-sm text-gray-600 mt-2">
            <span class="inline-block bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-semibold">
              "{{ query() }}"
            </span>
            <span class="ml-3 text-gray-500">{{ gifsByKey().length }} resultados</span>
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="max-w-6xl mx-auto px-6 py-8">
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <app-gif-list [gifs]="gifsByKey()" />
    </div>

<div class="flex flex-col h-screen bg-gradient-to-br from-gray-50 to-gray-100">
  <!-- Header -->
  <div class="bg-white shadow-md sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-6 py-6">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">
        Resultados de búsqueda
      </h1>
      <p class="text-sm text-gray-600">
        <span
          class="inline-block bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-semibold"
        >
          "{{ query() }}"
        </span>
        <span class="ml-3 text-gray-500"
          >{{ gifsByKey().length }} resultados</span
        >
      </p>
    </div>
  </div>

  <!-- Content -->
  <main class="flex-1 overflow-y-auto">
    <div class="max-w-6xl mx-auto px-6 py-8 w-full">
      <app-gif-list [gifs]="gifsByKey()" />
    </div>
  </main>
</div>

<div
  class="flex flex-col h-screen overflow-y-auto bg-gray-100"
  #resultsDiv
  (scroll)="onScroll($event)"
>
  <header class="bg-white shadow-md sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-6 py-6">
      <h1 class="text-3xl font-bold text-gray-900 text-center mb-4">
        Buscador de GIFs
      </h1>
      <div class="flex space-x-2">
        <input
          type="text"
          id=""
          placeholder="Busca GIFs por palabra clave"
          (keyup.enter)="onSearch(txtSearch.value)"
          #txtSearch
          class="flex-1 px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
        <button
          type="submit"
          class="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors"
        >
          Buscar
        </button>
      </div>
    </div>
  </header>

  <main class="flex-1">
    <div class="max-w-6xl mx-auto px-6 py-8 w-full">
      @if (gifService.searchGifsResults().length === 0) {
      <p class="text-center text-gray-500">
        Introduce una búsqueda para ver resultados.
      </p>
      } @else {
      <app-gif-list [gifs]="gifService.searchGifsResults()" />
      }
    </div>
  </main>
</div>

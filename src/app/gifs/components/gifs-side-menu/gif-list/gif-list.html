<div
  class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 lg:grid-cols-4 xl:grid-cols-4 gap-4"
>
  @for (group of gifGroups() ; track $index) {
  <div class="grid gap-4">
    @for (gif of group; track gif.id) {
    <div>
      <img
        class="h-full w-full object-cover rounded-lg"
        [src]="gif.url"
        [alt]="gif.tittle"
      />
    </div>

    }
  </div>

  }
</div>

<nav id="nav" class="w-full px-6 space-y-2">
  @for(item of menuOption; track item.route){

  <a
    [routerLink]="[item.route]"
    routerLinkActive=" bg-blue-800"
    class="w-full px-4 inline-flex space-x-2 items-center border-b border-slate-700 py-3 hover:bg-blue-700 rounded-lg transition ease-linear duration-150"
  >
    <i [class]="item.icon"></i>
    <div class="flex flex-col">
      <span class="text-lg font-bold leading-5 text-white">{{item.label}}</span>
      <span class="text-xs text-white/50 hidden md:block">{{item.subLabel}}</span>
    </div>
  </a>
  }@empty {
    <p>No hay opciones de menú disponibles.</p>
  }
</nav>

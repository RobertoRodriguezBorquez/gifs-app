<nav id="nav" class="w-full px-6 space-y-2">
  @for(item of menuOption; track item.route){

  <a
    [routerLink]="[item.route]"
    routerLinkActive=" bg-blue-800"
    class="w-full px-4 inline-flex space-x-2 items-center border-b border-slate-700 py-3 hover:bg-blue-700 rounded-lg transition ease-linear duration-150"
  >
    <i [class]="item.icon"></i>
    <div class="flex flex-col">
      <span class="text-lg font-bold leading-5 text-white">{{item.label}}</span>
      <span class="text-xs text-white/50 hidden md:block"
        >{{item.subLabel}}</span
      >
    </div>
  </a>
  }@empty {
  <p>No hay opciones de menú disponibles.</p>
  }
</nav>

<!-- historial busqueda -->
<nav id="nav" class="w-full px-6 pt-4 space-y-1">
  @for(key of gifService.searchHistoryKey(); track key){
  <div class="relative group">
    <a
      [routerLink]="['/dashboard/history', key]"
      routerLinkActive=" bg-blue-800"
      class="w-full px-4 inline-flex space-x-2 items-center border-b border-slate-700 py-3 hover:bg-blue-700 rounded-lg transition ease-linear duration-150 pr-10"
    >
      <i [class]="'fa-solid fa-clock mr-2'"></i>
      <div class="flex flex-col">
        <span class="text-lg font-bold leading-5 text-white">{{key}}</span>
      </div>
    </a>

    <!-- Botón de eliminar -->
    <button
      (click)="deleteHistoryItem(key); $event.stopPropagation()"
      class="absolute right-2 top-1/2 transform -translate-y-1/2 opacity-0 group-hover:opacity-100 transition-opacity duration-200 p-1 hover:bg-red-600 rounded"
      title="Eliminar del historial"
    >
      <i class="fa-solid fa-trash text-red-400 hover:text-white text-sm"></i>
    </button>
  </div>
  }
</nav>
